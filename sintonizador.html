<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintonizador Hi-Fi Rack Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent; /* Deixa o fundo transparente para assumir o do index.html se necessário */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden; /* Remove barras de rolagem indesejadas */
        }

        /* Painel Frontal Principal - Alumínio Escovado Anodizado */
        .player-container {
            position: relative;
            background-color: #1a1b1e;
            width: 100%;
            max-width: 780px;
            height: 100%;
            max-height: 420px;
            padding: 20px 35px; /* Ajustado ligeiramente para caber perfeitamente */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2;
            border-radius: 6px;
        }

        /* PARAFUSOS ALLEN DE FIXAÇÃO DE RACK (CSS Puro) */
        .screw {
            position: absolute;
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 35% 35%, #555 0%, #222 70%, #000 100%);
            border-radius: 50%;
            box-shadow: 
                inset 0 1px 2px rgba(255,255,255,0.2),
                0 2px 4px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Orifício Sextavado Allen */
        .screw::before {
            content: "";
            width: 6px;
            height: 6px;
            background: #0d0e10;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
        }
        .screw-tl { top: 12px; left: 12px; }
        .screw-tr { top: 12px; right: 12px; }
        .screw-bl { bottom: 12px; left: 12px; }
        .screw-br { bottom: 12px; right: 12px; }

        /* Secções Internas */
        .left-section {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .right-section {
            flex: 0.7;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 1px dashed rgba(255, 255, 255, 0.04);
            padding-left: 30px;
            min-width: 0;
        }

        /* Moldura de Vidro Acrílico Recortada em CNC */
        .lcd-bezel {
            background-color: #050506;
            border-top: 3px solid #060608;
            border-left: 3px solid #0c0d10;
            border-right: 3px solid #2d3038;
            border-bottom: 3px solid #424650;
            padding: 6px;
            border-radius: 4px;
            box-shadow: 
                inset 0 5px 15px rgba(0, 0, 0, 0.98),
                0 1px 1px rgba(255, 255, 255, 0.08);
            height: 100%;
            box-sizing: border-box;
        }

        /* Ecrã de Quartzo Fumé (Sem Grelha de Fósforo - Totalmente Nítido) */
        .lcd-display {
            background: radial-gradient(circle at center, #1c0900 0%, #050100 100%);
            padding: 16px 20px;
            font-family: 'Share Tech Mono', monospace;
            color: #ff5500; 
            text-shadow: 0 0 10px rgba(255, 85, 0, 0.7);
            border-radius: 2px;
            height: calc(100% - 12px);
            min-height: 210px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.9);
            box-sizing: border-box;
            transition: all 0.6s cubic-bezier(0.1, 0.8, 0.2, 1);
            overflow: hidden;
            
            /* Cintilação analógica ultra suave e realista do filamento de vácuo */
            animation: vfd-flicker 0.2s infinite alternate;
        }

        /* Brilho de Reflexo no Vidro Limpo */
        .lcd-display::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 40%, transparent 40%);
            pointer-events: none;
            z-index: 11;
        }

        /* Ecrã Totalmente Apagado */
        .player-container.power-off .lcd-display {
            background: #020203;
            color: rgba(255, 85, 0, 0.005) !important;
            text-shadow: none !important;
            box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.98);
            animation: none;
        }
        
        .player-container.power-off .lcd-display * {
            color: rgba(255, 85, 0, 0.005) !important;
            text-shadow: none !important;
            border-color: rgba(255, 85, 0, 0.005) !important;
            background-color: transparent !important;
            box-shadow: none !important;
        }

        @keyframes vfd-flicker {
            0% { opacity: 0.99; }
            100% { opacity: 1; }
        }

        .lcd-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .lcd-info {
            flex-grow: 1;
            min-width: 0; 
            overflow: hidden;
        }

        .lcd-status {
            font-size: 0.7rem;
            color: #ff2200;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1.5px;
        }

.lcd-station-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            margin: 4px 0;
            display: block;
        }

        .lcd-station {
            display: inline-block;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #ff6600;
            /* Garante que o texto começa sem deslocamento */
            padding-left: 0;
            white-space: nowrap;
        }

        /* Classe que será adicionada via JS apenas se o texto for grande */
        .scroll-enabled {
            animation: scroll-station 8s linear infinite;
        }

        @keyframes scroll-station {
            0% { transform: translateX(0%); }
            10% { transform: translateX(0%); } /* Pausa no início */
            90% { transform: translateX(calc(-100% + 200px)); } /* Desloca o texto */
            100% { transform: translateX(calc(-100% + 200px)); } /* Pausa no fim */
        }

        .lcd-genre {
            font-size: 0.8rem;
            color: #ff8800;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lcd-indicators {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            margin-left: 10px;
            padding-top: 2px;
        }

        .stereo-light {
            font-size: 0.6rem;
            font-weight: bold;
            border: 1px solid rgba(255, 68, 0, 0.15);
            padding: 2px 6px;
            border-radius: 1px;
            color: #ff4400;
            opacity: 0.05; 
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .stereo-light.active {
            opacity: 1;
            color: #ff3300;
            border-color: #ff3300;
            text-shadow: 0 0 10px rgba(255, 51, 0, 0.9);
            background-color: rgba(255, 51, 0, 0.03);
        }

        /* Painel de Sinal Luminoso de Sintonização */
        .tuning-signals-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            border-top: 1px solid rgba(255, 85, 0, 0.08);
            padding-top: 8px;
        }

        .tuning-led-label {
            font-size: 0.6rem;
            color: #ff4400;
            opacity: 0.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .state-leds {
            display: flex;
            gap: 8px;
        }

        .state-led {
            font-size: 0.55rem;
            font-weight: bold;
            padding: 1px 4px;
            border-radius: 1px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: #ffffff;
            opacity: 0.1;
            transition: all 0.2s ease;
        }

        .state-led.tuning-active {
            color: #ff1100;
            border-color: #ff1100;
            text-shadow: 0 0 6px #ff1100;
            opacity: 1;
        }

        .state-led.signal-active {
            color: #00ff66;
            border-color: #00ff66;
            text-shadow: 0 0 6px #00ff44;
            opacity: 1;
        }

        .signal-bar-container {
            display: flex;
            gap: 2.5px;
            flex-grow: 1;
        }

        .sig-segment {
            height: 6px;
            width: 10px;
            background-color: #1a0800;
            border-radius: 1px;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .sig-segment.on {
            background-color: #ff7700;
            box-shadow: 0 0 4px #ff5500;
        }

        /* Canal de Texto de Informações */
        .lcd-track-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            background-color: rgba(0,0,0,0.5);
            padding: 5px 0;
            border-radius: 2px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 85, 0, 0.04);
        }

        .lcd-track {
            display: inline-block;
            font-size: 0.85rem;
            color: #ffaa00;
            padding-left: 100%;
            animation: scroll-text 16s linear infinite;
        }

        @keyframes scroll-text {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* VU Meter Dual */
        .vu-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-top: 1px solid rgba(255, 85, 0, 0.12);
            padding-top: 8px;
        }

        .vu-row {
            display: flex;
            align-items: center;
            font-size: 0.65rem;
            font-weight: bold;
            color: #ff3300;
        }

        .vu-label {
            width: 12px;
        }

        .vu-meter {
            display: flex;
            gap: 2.5px;
            flex-grow: 1;
            margin-left: 6px;
        }

        .vu-segment {
            height: 5px;
            flex-grow: 1;
            background-color: #1c0700;
            border-radius: 1px;
            transition: background-color 0.04s ease;
        }

        .vu-segment.on-green { background-color: #ffaa00; box-shadow: 0 0 3px #ffaa00; }
        .vu-segment.on-amber { background-color: #ff5500; box-shadow: 0 0 3px #ff5500; }
        .vu-segment.on-red { background-color: #ff0000; box-shadow: 0 0 5px #ff0000; }

        /* Consola de Controlo */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            justify-content: space-between;
        }

        /* Caixa Escavada CNC para o Seletor */
        .select-wrapper {
            position: relative;
            background-color: #0c0d10;
            padding: 3px;
            border-radius: 5px;
            box-shadow: 
                inset 0 2px 5px rgba(0,0,0,0.9),
                0 1px 1px rgba(255,255,255,0.08);
        }

        select {
            background: linear-gradient(180deg, #24252a 0%, #131417 100%);
            color: #c9c0b2;
            border-top: 1px solid #42444d;
            border-left: 1px solid #32333a;
            border-right: 1px solid #000;
            border-bottom: 1px solid #000;
            padding: 12px 15px;
            border-radius: 3px;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }

        /* Linha de Botões e Sliders */
        .buttons-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    margin-top: 15px; /* Adicione esta linha para baixar os botões */
}

        /* Encaixe de Metal CNC Recortado para os Botões */
        .btn-socket {
            background-color: #0c0d10;
            padding: 6px;
            border-radius: 5px;
            box-shadow: 
                inset 0 3px 6px rgba(0,0,0,0.95),
                0 1px 1px rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .btn-led {
            width: 5px;
            height: 5px;
            background-color: #1e0202;
            border-radius: 50%;
            box-shadow: 
                inset 0 1px 1px rgba(0,0,0,0.9),
                0 1px 0 rgba(255,255,255,0.05);
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        /* Quando está a tocar, a luz fica laranja */
        .btn-container.active .btn-led {
            background-color: #ff9800; 
            box-shadow: 
            0 0 10px #ff9800, 
            0 0 5px #ff9800,
            inset 0 1px 0 rgba(255,255,255,0.2);
        }

        /* Botões de Alumínio Polido CNC */
        button {
            position: relative;
            background: 
                radial-gradient(circle at center, rgba(255, 255, 255, 0.12) 0%, transparent 75%),
                linear-gradient(135deg, #60626a 0%, #3e4046 45%, #1d1e21 55%, #3e4046 100%);
            
            border-top: 2.2px solid #9ea3ae;
            border-left: 1.8px solid #737781;
            border-right: 1.5px solid #141517;
            border-bottom: 4px solid #07080a;
            
            color: #ffffff;
            font-weight: bold;
            border-radius: 3px;
            width: 48px;
            height: 38px;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            
            box-shadow: 
                0 4px 6px rgba(0,0,0,0.8),
                inset 0 1px 0 rgba(255,255,255,0.15);
            
            transition: all 0.05s ease;
        }

        button:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
            border-top-color: #242528;
            border-left-color: #242528;
            box-shadow: 
                0 1px 2px rgba(0,0,0,0.9),
                inset 0 1px 3px rgba(0,0,0,0.6);
            background: linear-gradient(135deg, #242528 0%, #101112 100%);
        }

        /* Botão POWER em Baixo Relevo Especial */
        .power-btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .power-led {
            width: 6px;
            height: 6px;
            background-color: #021a05;
            border-radius: 50%;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.9);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .power-on .power-led {
            background-color: #00ff44;
            box-shadow: 
                0 0 8px #00ff44, 
                0 0 3px #00ff33,
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        /* Atenuador de Volume Deslizante Embutido */
        .volume-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: #72757c;
            font-size: 0.65rem;
            font-weight: bold;
            letter-spacing: 1px;
            width: 100px;
            min-width: 90px;
        }

        .volume-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 1px;
        }

        /* Rasgo escavado CNC para o fader */
        .volume-slider-wrapper {
            background-color: #060608;
            border-top: 2px solid #000;
            border-left: 2px solid #000;
            border-right: 2px solid #37393f;
            border-bottom: 2px solid #44474e;
            padding: 4px 6px;
            border-radius: 3px;
            box-shadow: 
                inset 0 4px 10px rgba(0,0,0,0.95),
                0 1px 1px rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
            width: 100%;
            margin: 0;
        }

        /* Manípulo do Fader de Metal Sólido */
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 24px;
            border-radius: 1px;
            background: linear-gradient(90deg, #333 0%, #777 20%, #ececec 50%, #777 80%, #222 100%);
            border: 1px solid #000;
            box-shadow: 
                0 4px 8px rgba(0,0,0,0.85),
                inset 0 1px 0 rgba(255,255,255,0.4);
            cursor: pointer;
        }

        /* RESPONSIVIDADE PARA O CODEPEN */
        @media (max-width: 768px) {
            .chassis-vent {
                display: none;
            }

            .player-container {
                flex-direction: column;
                gap: 20px;
                padding: 30px 20px;
            }

            .right-section {
                border-left: none;
                border-top: 1px dashed rgba(255, 255, 255, 0.1);
                padding-left: 0;
                padding-top: 20px;
                gap: 20px;
            }

            .buttons-row {
                justify-content: center;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
    <div class="chassis-vent"></div>

    <div class="player-container" id="chassis">
        <div class="screw screw-tl"></div>
        <div class="screw screw-tr"></div>
        <div class="screw screw-bl"></div>
        <div class="screw screw-br"></div>

        <div class="left-section">
            <div class="lcd-bezel">
                <div class="lcd-display">
                    <div class="lcd-top-row">
                        <div class="lcd-info">
                            <div id="lcd-status" class="lcd-status">SISTEMA PRONTO</div>
                            <div class="lcd-station-container">
                                <div id="lcd-station" class="lcd-station">SEM SINAL</div>
                            </div>
                            <div id="lcd-genre" class="lcd-genre">ESCOLHER EMISSORA</div>
                        </div>
                        <div class="lcd-indicators">
                            <span id="stereo-indicator" class="stereo-light">STEREO</span>
                        </div>
                    </div>

                    <div class="tuning-signals-group">
                        <span class="tuning-led-label">SIGNAL</span>
                        <div class="signal-bar-container" id="signal-bar">
                            <div class="sig-segment"></div>
                            <div class="sig-segment"></div>
                            <div class="sig-segment"></div>
                            <div class="sig-segment"></div>
                            <div class="sig-segment"></div>
                            <div class="sig-segment"></div>
                        </div>
                        <div class="state-leds">
                            <span id="led-tuning" class="state-led tuning-active">TUNING</span>
                            <span id="led-signal" class="state-led">SIGNAL</span>
                        </div>
                    </div>

                    <div class="lcd-track-container">
                        <div id="lcd-track" class="lcd-track">A AGUARDAR TRANSMISSÃO...</div>
                    </div>

                    <div class="vu-container">
                        <div class="vu-row">
                            <span class="vu-label">L</span>
                            <div class="vu-meter" id="vu-left"></div>
                        </div>
                        <div class="vu-row">
                            <span class="vu-label">R</span>
                            <div class="vu-meter" id="vu-right"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-section">
            <audio id="audio-player" preload="auto" playsinline crossorigin="anonymous"></audio>

            <div class="select-wrapper">
    <select id="station-select">
        <option value="" disabled selected>SELECIONE UMA ESTAÇÃO...</option>
    </select>
</div>

                <div class="buttons-row">
                    <div class="btn-socket">
                        <div class="power-btn-container power-on" id="power-container">
                            <div class="power-led"></div>
                            <button id="power-btn" style="background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%), linear-gradient(135deg, #a62b2b 0%, #701a1a 100%); border-top: 1.5px solid #d45d5d; border-bottom: 3.5px solid #3d0a0a;" title="Power On/Off">POWER</button>
                        </div>
                    </div>

                    <div class="btn-socket">
                        <div class="btn-container">
                            <div class="btn-led"></div>
                            <button id="prev-btn" title="Anterior">⏮</button>
                        </div>
                    </div>

                    <div class="btn-socket">
                        <div class="btn-container" id="play-container">
                            <div class="btn-led"></div>
                            <button id="play-btn" title="Play/Pause">▶</button>
                        </div>
                    </div>

                    <div class="btn-socket">
                        <div class="btn-container">
                            <div class="btn-led"></div>
                            <button id="next-btn" title="Próximo">⏭</button>
                        </div>
                    </div>
                    
                    <div class="volume-container">
                        <div class="volume-labels">
                            <span>VOLUME</span>
                            <span id="volume-val">80</span>
                        </div>
                        <div class="volume-slider-wrapper">
                            <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const playlist = [
        { name: "Indie Pop Rock's", genre: "Alternativa / Indie / Pop-Rock", url: "https://ice6.somafm.com/indiepop-128-mp3", api: "https://api.somafm.com/indiepop.json" },
        { name: "Indie X FM", genre: "Alternativa / Indie / Pop-Rock", url: "https://kathy.torontocast.com:2695/stream", api: null },
        { name: "Digitalis", genre: "Alternativa / Indie / Pop-Rock", url: "https://ice3.somafm.com/digitalis-256-mp3", api: "https://api.somafm.com/digitalis.json" },
        { name: "M80 Indie", genre: "Alternativa / Indie / Pop-Rock", url: "https://stream-icy.bauermedia.pt/m80indie.aac", api: null },
		{ name: "La Indie", genre: "Indie / Alternativo", url: "https://stream2.mediasector.es/laindie-aac", api: null },
		{ name: "Delta Radio", genre: "Indie / Alternativa / Pop-Rock", url: "https://deltaradio.streamabc.net/regc-deltaindie-mp3-192-2101701", api: null },
        { name: "1000 Hits Love", genre: "Romântica / Baladas", url: "http://c2.auracast.net:8097/stream", api: null },
        { name: "M80 Ballads", genre: "Baladas / 80's / 90's", url: "https://stream-icy.bauermedia.pt/m80ballads.aac", api: null },

    // 2. Definir o resto das constantes (sem repetir o stationSelect)
    const audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const powerBtn = document.getElementById('power-btn');

    const volumeVal = document.getElementById('volume-val');

    const lcdStatus = document.getElementById('lcd-status');
    const lcdStation = document.getElementById('lcd-station');
    const lcdGenre = document.getElementById('lcd-genre');
    const lcdTrack = document.getElementById('lcd-track');
    const stereoIndicator = document.getElementById('stereo-indicator');
    const playContainer = document.getElementById('play-container');
    const signalBar = document.getElementById('signal-bar');
    const ledTuning = document.getElementById('led-tuning');
    const ledSignal = document.getElementById('led-signal');

    let currentStationIndex = null;
    let metadataInterval = null;
    let isPowerOn = true;

    // --- VU METER ---
    const vuLeftContainer = document.getElementById('vu-left');
    const vuRightContainer = document.getElementById('vu-right');
    const numSegments = 18; 

    function createVUMeters() {
        for (let i = 0; i < numSegments; i++) {
            const segL = document.createElement('div');
            segL.classList.add('vu-segment');
            vuLeftContainer.appendChild(segL);

            const segR = document.createElement('div');
            segR.classList.add('vu-segment');
            vuRightContainer.appendChild(segR);
        }
    }
    createVUMeters();

    const leftSegments = vuLeftContainer.children;
    const rightSegments = vuRightContainer.children;

    let audioCtx = null;
    let analyser = null;
    let source = null;
    let dataArray = null;
    let animationFrameId = null;

    function initAudioAnalyser() {
        if (audioCtx) return; 
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64; 
            
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            dataArray = new Uint8Array(analyser.frequencyBinCount);
        } catch (e) {
            console.warn("Web Audio API bloqueada.", e);
        }
    }

    function drawVU() {
        if (!isPowerOn) return;
        animationFrameId = requestAnimationFrame(drawVU);
        if (!analyser || audio.paused) {
            resetVUMeters();
            return;
        }
        analyser.getByteFrequencyData(dataArray);
        let leftValue = 0, rightValue = 0;
        for (let i = 0; i < 4; i++) leftValue += dataArray[i];
        leftValue = leftValue / 4;
        for (let i = 4; i < 10; i++) rightValue += dataArray[i];
        rightValue = rightValue / 6;

        const leftLedsActive = Math.round((leftValue / 200) * numSegments);
        const rightLedsActive = Math.round((rightValue / 180) * numSegments);
        updateLEDArray(leftSegments, leftLedsActive);
        updateLEDArray(rightSegments, rightLedsActive);
    }

    function updateLEDArray(segments, numActive) {
        for (let i = 0; i < numSegments; i++) {
            segments[i].className = 'vu-segment'; 
            if (i < numActive) {
                if (i < 12) segments[i].classList.add('on-green'); 
                else if (i < 16) segments[i].classList.add('on-amber'); 
                else segments[i].classList.add('on-red');   
            }
        }
    }

    function resetVUMeters() {
        for (let i = 0; i < numSegments; i++) {
            leftSegments[i].className = 'vu-segment';
            rightSegments[i].className = 'vu-segment';
        }
    }

    // --- INDICADOR DE FORÇA DE SINAL ---
    function updateSignalStrength(isOn) {
        const segments = signalBar.children;
        if (isOn) {
            let delay = 0;
            for (let i = 0; i < segments.length; i++) {
                setTimeout(() => {
                    if (isPowerOn && currentStationIndex !== null && !audio.paused) {
                        segments[i].classList.add('on');
                    }
                }, delay);
                delay += 80;
            }
            ledTuning.classList.remove('tuning-active');
            ledSignal.classList.add('signal-active');
        } else {
            for (let i = 0; i < segments.length; i++) {
                segments[i].classList.remove('on');
            }
            ledTuning.classList.add('tuning-active');
            ledSignal.classList.remove('signal-active');
        }
    }

    function checkStationOverflow() {
        const container = document.querySelector('.lcd-station-container');
        const station = document.getElementById('lcd-station');
        
        station.classList.remove('scroll-enabled');
        
        // Forçar renderização de layout
        station.style.display = 'inline-block';
        station.style.whiteSpace = 'nowrap';
        
        // O offsetWidth é mais preciso para medir o elemento visível
        if (station.scrollWidth > container.clientWidth) {
            station.classList.add('scroll-enabled');
            console.log("Animação ativada para:", station.textContent);
        } else {
            console.log("Texto cabe no espaço, animação não necessária.");
        }
    }




    // --- METADADOS ---
    async function fetchMetadata(station) {
    if (!isPowerOn) return;

    // 1. Tentar API dedicada (SomaFM, etc)
    if (station.api) {
        try {
            const res = await fetch(station.api);
            const data = await res.json();
            
            // Extração flexível para SomaFM e outras APIs similares
            const artist = data.main?.song?.artist || data.songs?.[0]?.artist;
            const title = data.main?.song?.title || data.songs?.[0]?.title;
            
            if (artist && title) {
                lcdTrack.textContent = `${artist} - ${title}`.toUpperCase();
                return; 
            }
        } catch (e) {
            console.warn("API dedicada indisponível, passando para fallback Icecast...");
        }
    }

    // 2. Método Icecast (Padrão para a maioria das rádios)
    try {
        const baseUrl = station.url.substring(0, station.url.lastIndexOf('/'));
        const response = await fetch(`${baseUrl}/status-json.xsl`);
        const data = await response.json();
        
        // Verifica se a estrutura icestats existe
        if (data.icestats && data.icestats.source) {
            let source = data.icestats.source;
            const sources = Array.isArray(source) ? source : [source];
            
            // Busca o stream que corresponde à URL da estação
            const activeSource = sources.find(s => 
                station.url.includes(s.listenurl) || s.listenurl.includes(station.url)
            );
            
            // Valida se há um título real (evita mostrar " - " ou espaços em branco)
            if (activeSource && activeSource.title && activeSource.title.trim().length > 0) {
                lcdTrack.textContent = activeSource.title.toUpperCase();
                return;
            }
        }
    } catch (e) {
        console.warn("Erro ao ler Icecast, usando nome da estação.");
    }

    // 3. Fallback Final (Identidade da Rádio)
    lcdTrack.textContent = "EM EMISSÃO: " + station.name.toUpperCase();
}

    function startMetadataPolling(station) {
        clearInterval(metadataInterval);
        fetchMetadata(station);
        metadataInterval = setInterval(() => fetchMetadata(station), 15000);
    }

    function stopMetadataPolling() {
        clearInterval(metadataInterval);
        if (isPowerOn) {
            lcdTrack.textContent = "SISTEMA EM ESPERA";
        }
    }

    // --- SISTEMA ---
    function updateLCD(status, station, genre) {
        if (!isPowerOn) return;
        lcdStatus.textContent = status;
        lcdStation.textContent = station;
        lcdGenre.textContent = genre;
    }

    function playStation(index) {
        if (!isPowerOn) return;
        initAudioAnalyser();
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        currentStationIndex = parseInt(index);
        const station = playlist[currentStationIndex];

        stationSelect.value = currentStationIndex;
        
        // Garante carregamento limpo e forçado para telemóveis
        audio.pause();
        audio.src = "";
        audio.src = station.url;
        audio.load();
        
        updateLCD("A SINTONIZAR...", station.name, station.genre);
        setTimeout(checkStationOverflow, 100);
        lcdTrack.textContent = "A LIGAR À EMISSÃO...";
        stereoIndicator.classList.remove('active');
        playContainer.classList.remove('active');
        updateSignalStrength(false);
        
        audio.play()
            .then(() => {
                playBtn.innerHTML = "⏸";
                playContainer.classList.add('active'); 
                updateLCD("SINALOK - NO AR", station.name, station.genre);
                stereoIndicator.classList.add('active');
                updateSignalStrength(true);
                
                startMetadataPolling(station);
                if (!animationFrameId) drawVU();
            })
            .catch(err => {
                console.warn("Erro no play():", err);
                updateLCD("ERRO DE SINTONIA", station.name, "VERIFIQUE A LIGAÇÃO");
                stereoIndicator.classList.remove('active');
                playContainer.classList.remove('active');
                stopMetadataPolling();
                resetVUMeters();
                updateSignalStrength(false);
            });
    }

    stationSelect.addEventListener('change', (e) => {
        playStation(e.target.value);
    });

    playBtn.addEventListener('click', () => {
        if (!isPowerOn) return;
        if (currentStationIndex === null) {
            playStation(0);
            return;
        }

        initAudioAnalyser();
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        if (audio.paused) {
            const station = playlist[currentStationIndex];
            updateLCD("A SINTONIZAR...", station.name, station.genre);
            updateSignalStrength(false);
            audio.load(); 
            audio.play()
                .then(() => {
                    playBtn.innerHTML = "⏸";
                    playContainer.classList.add('active');
                    updateLCD("SINALOK - NO AR", station.name, station.genre);
                    stereoIndicator.classList.add('active');
                    updateSignalStrength(true);
                    startMetadataPolling(station);
                    if (!animationFrameId) drawVU();
                })
                .catch(err => {
                    console.warn("Erro no play de retomada:", err);
                });
        } else {
            audio.pause();
            playBtn.innerHTML = "▶";
            playContainer.classList.remove('active');
            const station = playlist[currentStationIndex];
            updateLCD("EM PAUSA", station.name, station.genre);
            stereoIndicator.classList.remove('active');
            stopMetadataPolling();
            resetVUMeters();
            updateSignalStrength(false);
        }
    });

    nextBtn.addEventListener('click', () => {
        if (!isPowerOn) return;
        if (currentStationIndex === null) {
            playStation(0);
        } else {
            let nextIndex = (currentStationIndex + 1) % playlist.length;
            playStation(nextIndex);
        }
    });

    prevBtn.addEventListener('click', () => {
        if (!isPowerOn) return;
        if (currentStationIndex === null) {
            playStation(playlist.length - 1);
        } else {
            let prevIndex = (currentStationIndex - 1 + playlist.length) % playlist.length;
            playStation(prevIndex);
        }
    });

    volumeSlider.addEventListener('input', (e) => {
        const currentVolume = parseFloat(e.target.value);
        audio.volume = currentVolume;
        volumeVal.textContent = Math.round(currentVolume * 100);
    });

    // INTERRUPTOR POWER
    powerBtn.addEventListener('click', () => {
        isPowerOn = !isPowerOn;

        if (isPowerOn) {
            chassis.classList.remove('power-off');
            powerContainer.classList.add('power-on');
            
            setTimeout(() => {
                lcdStatus.textContent = "SISTEMA PRONTO";
                lcdStation.textContent = "SEM SINAL";
                lcdGenre.textContent = "ESCOLHER EMISSORA";
                lcdTrack.textContent = "A AGUARDAR TRANSMISSÃO...";
                ledTuning.classList.add('tuning-active');
            }, 100);
        } else {
            audio.pause();
            stopMetadataPolling();
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
            
            chassis.classList.add('power-off');
            powerContainer.classList.remove('power-on');
            playContainer.classList.remove('active');
            stereoIndicator.classList.remove('active');
            
            resetVUMeters();
            updateSignalStrength(false);
            ledTuning.classList.remove('tuning-active');
            ledSignal.classList.remove('signal-active');
            playBtn.innerHTML = "▶";
        }
    });
</script>

</body>
</html>
