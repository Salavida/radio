<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Vida</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  body {
    background: url("imagens/background4.jpg") no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 30px 0;
    color: #fff;
  }

  /* ELEMENTOS ALINHADOS COM MESMA LARGURA */
  .block {
    width: 800px;
    max-width: 95%;
    border: 3px solid #ff8c00;
    border-radius: 10px;
    margin-bottom: 25px;
    padding: 0px;
    text-align: center;
    background: rgba(0,0,0,0.3);
  }

  /* IMAGEM DO TOPO */
  .top-image {
    width: 100%;
    border-radius: 10px;
  }

  /* GIF VU METER */
  .vu-meter {
    max-height: 80px;   
    width: 100%;         
    border-radius: 10px;
  }

  /* WIDGET */
  .widget-wrapper {
    width: 800px;
    max-width: 95%;
    border: 3px solid #ff8c00;
    border-radius: 10px;
    padding: 10px 0px; 
    min-height: 110px;  
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cstrEmbed {
    width: 100%;
    border-radius: 8px;
  }
  
  /* SEPARADOR */
  .separator-image {
    width: 1010px;
    max-width: 95%;
    margin-top: 60px;
  }

  .separator-image img {
    width: 100%;
    height: 200px; 
    object-fit: cover; 
    border-radius: 10px;
  }
  
  /* ESTILO DO BOTÃO DE CONTACTO */
  .contact-button {
    display: inline-block;
    padding: 15px 30px;
    background-color: #ff8c00 !important;
    color: #ffffff !important;
    text-decoration: none;
    font-weight: bold;
    border-radius: 10px;
    margin-top: 60px;
    font-size: 18px;
    border: none;
    cursor: pointer;
  }

  .contact-button:hover {
    background-color: #e67e00 !important;
  }

  /* --- SINTONIZADOR COM FORMATO ORIGINAL (LCD EM CIMA, BOTÕES EM BAIXO) --- */
  .player-wrapper-outer {
    width: 780px;
    max-width: 95%;
    margin-top: 30px;
    display: flex;
    justify-content: center;
  }

  .player-container {
    position: relative;
    background-color: #1a1b1e;
    width: 100%;
    max-width: 800px;
    padding: 35px 30px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 2;
    border-radius: 6px;
    border: none;
  }

  .screw {
    position: absolute;
    width: 14px;
    height: 14px;
    background: radial-gradient(circle at 35% 35%, #555 0%, #222 70%, #000 100%);
    border-radius: 50%;
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 2px 4px rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .screw::before {
    content: "";
    width: 6px;
    height: 6px;
    background: #0d0e10;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
  }
  .screw-tl { top: 12px; left: 12px; }
  .screw-tr { top: 12px; right: 12px; }
  .screw-bl { bottom: 12px; left: 12px; }
  .screw-br { bottom: 12px; right: 12px; }

  .lcd-bezel {
    background-color: #050506;
    border-top: 3px solid #060608;
    border-left: 3px solid #0c0d10;
    border-right: 3px solid #2d3038;
    border-bottom: 3px solid #424650;
    padding: 6px;
    border-radius: 4px;
    box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.98), 0 1px 1px rgba(255, 255, 255, 0.08);
    box-sizing: border-box;
    width: 100%;
  }

  .lcd-display {
    background: radial-gradient(circle at center, #1c0900 0%, #050100 100%);
    padding: 16px 20px;
    font-family: 'Share Tech Mono', monospace;
    color: #ff5500; 
    text-shadow: 0 0 10px rgba(255, 85, 0, 0.7);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.9);
    box-sizing: border-box;
    overflow: hidden;
    animation: vfd-flicker 0.2s infinite alternate;
  }

  .lcd-display::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 40%, transparent 40%);
    pointer-events: none;
    z-index: 11;
  }

  .player-container.power-off .lcd-display {
    background: #020203;
    color: rgba(255, 85, 0, 0.005) !important;
    text-shadow: none !important;
    box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.98);
    animation: none;
  }
  
  .player-container.power-off .lcd-display * {
    color: rgba(255, 85, 0, 0.005) !important;
    text-shadow: none !important;
    border-color: rgba(255, 85, 0, 0.005) !important;
    background-color: transparent !important;
    box-shadow: none !important;
  }

  @keyframes vfd-flicker {
    0% { opacity: 0.99; }
    100% { opacity: 1; }
  }

  .lcd-top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    width: 100%;
  }

  .lcd-info {
    flex-grow: 1;
    min-width: 0; 
    overflow: hidden;
  }

  .lcd-status {
    font-size: 0.7rem;
    color: #ff2200;
    text-transform: uppercase;
    font-weight: bold;
    letter-spacing: 1.5px;
  }

  .lcd-station-container {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    margin: 4px 0;
    display: block;
  }

  .lcd-station {
    display: inline-block;
    font-size: 1.8rem;
    font-weight: bold;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #ff6600;
    padding-left: 0;
    white-space: nowrap;
  }

  .scroll-enabled {
    animation: scroll-station 8s linear infinite;
  }

  @keyframes scroll-station {
    0% { transform: translateX(0%); }
    10% { transform: translateX(0%); } 
    90% { transform: translateX(calc(-100% + 200px)); } 
    100% { transform: translateX(calc(-100% + 200px)); } 
  }

  .lcd-genre {
    font-size: 0.8rem;
    color: #ff8800;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lcd-indicators {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    margin-left: 10px;
    padding-top: 2px;
  }

  .stereo-light {
    font-size: 0.6rem;
    font-weight: bold;
    border: 1px solid rgba(255, 68, 0, 0.15);
    padding: 2px 6px;
    border-radius: 1px;
    color: #ff4400;
    opacity: 0.05; 
    transition: all 0.3s ease;
    letter-spacing: 1px;
  }

  .stereo-light.active {
    opacity: 1;
    color: #ff3300;
    border-color: #ff3300;
    text-shadow: 0 0 10px rgba(255, 51, 0, 0.9);
    background-color: rgba(255, 51, 0, 0.03);
  }

  .tuning-signals-group {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    border-top: 1px solid rgba(255, 85, 0, 0.08);
    padding-top: 8px;
  }

  .tuning-led-label {
    font-size: 0.6rem;
    color: #ff4400;
    opacity: 0.5;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .state-leds {
    display: flex;
    gap: 8px;
  }

  .state-led {
    font-size: 0.55rem;
    font-weight: bold;
    padding: 1px 4px;
    border-radius: 1px;
    border: 1px solid rgba(255, 255, 255, 0.03);
    color: #ffffff;
    opacity: 0.1;
    transition: all 0.2s ease;
  }

  .state-led.tuning-active {
    color: #ff1100;
    border-color: #ff1100;
    text-shadow: 0 0 6px #ff1100;
    opacity: 1;
  }

  .state-led.signal-active {
    color: #00ff66;
    border-color: #00ff66;
    text-shadow: 0 0 6px #00ff44;
    opacity: 1;
  }

  .signal-bar-container {
    display: flex;
    gap: 2.5px;
    flex-grow: 1;
  }

  .sig-segment {
    height: 6px;
    width: 10px;
    background-color: #1a0800;
    border-radius: 1px;
    transition: background-color 0.2s ease, box-shadow 0.2s ease;
  }

  .sig-segment.on {
    background-color: #ff7700;
    box-shadow: 0 0 4px #ff5500;
  }

  .lcd-track-container {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    background-color: rgba(0,0,0,0.5);
    padding: 5px 0;
    border-radius: 2px;
    margin-bottom: 8px;
    border: 1px solid rgba(255, 85, 0, 0.04);
  }

  .lcd-track {
    display: inline-block;
    font-size: 0.85rem;
    color: #ffaa00;
    padding-left: 100%;
    animation: scroll-text 16s linear infinite;
  }

  @keyframes scroll-text {
    0% { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-100%, 0, 0); }
  }

  .vu-container {
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-top: 1px solid rgba(255, 85, 0, 0.12);
    padding-top: 8px;
  }

  .vu-row {
    display: flex;
    align-items: center;
    font-size: 0.65rem;
    font-weight: bold;
    color: #ff3300;
  }

  .vu-label {
    width: 12px;
  }

  .vu-meter-inner {
    display: flex;
    gap: 2.5px;
    flex-grow: 1;
    margin-left: 6px;
  }

  .vu-segment {
    height: 5px;
    flex-grow: 1;
    background-color: #1c0700;
    border-radius: 1px;
    transition: background-color 0.04s ease;
  }

  .vu-segment.on-green { background-color: #ffaa00; box-shadow: 0 0 3px #ffaa00; }
  .vu-segment.on-amber { background-color: #ff5500; box-shadow: 0 0 3px #ff5500; }
  .vu-segment.on-red { background-color: #ff0000; box-shadow: 0 0 5px #ff0000; }

  /* CONTROLOS E BOTÕES EM BAIXO DO LCD */
  .controls-section {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
    border-top: 1px dashed rgba(255, 255, 255, 0.08);
    padding-top: 15px;
  }

  .select-wrapper {
    position: relative;
    background-color: #0c0d10;
    padding: 3px;
    border-radius: 5px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.9), 0 1px 1px rgba(255,255,255,0.08);
    width: 100%;
    box-sizing: border-box;
  }

  select {
    background: linear-gradient(180deg, #24252a 0%, #131417 100%);
    color: #c9c0b2;
    border-top: 1px solid #42444d;
    border-left: 1px solid #32333a;
    border-right: 1px solid #000;
    border-bottom: 1px solid #000;
    padding: 12px 15px;
    border-radius: 3px;
    font-size: 0.85rem;
    width: 100%;
    outline: none;
    cursor: pointer;
    font-family: inherit;
    box-sizing: border-box;
  }

  .buttons-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    width: 100%;
  }

  .btn-socket {
    background-color: #0c0d10;
    padding: 6px;
    border-radius: 5px;
    box-shadow: inset 0 3px 6px rgba(0,0,0,0.95), 0 1px 1px rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .btn-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .btn-led {
    width: 5px;
    height: 5px;
    background-color: #1e0202;
    border-radius: 50%;
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.05);
    transition: background-color 0.2s, box-shadow 0.2s;
  }

  .btn-container.active .btn-led {
    background-color: #ff9800; 
    box-shadow: 0 0 10px #ff9800, 0 0 5px #ff9800, inset 0 1px 0 rgba(255,255,255,0.2);
  }

  button {
    position: relative;
    background: radial-gradient(circle at center, rgba(255, 255, 255, 0.12) 0%, transparent 75%),
                linear-gradient(135deg, #60626a 0%, #3e4046 45%, #1d1e21 55%, #3e4046 100%);
    border-top: 2.2px solid #9ea3ae;
    border-left: 1.8px solid #737781;
    border-right: 1.5px solid #141517;
    border-bottom: 4px solid #07080a;
    color: #ffffff;
    font-weight: bold;
    border-radius: 3px;
    width: 48px;
    height: 38px;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: all 0.05s ease;
  }

  button:active {
    transform: translateY(2px);
    border-bottom-width: 1px;
    border-top-color: #242528;
    border-left-color: #242528;
    box-shadow: 0 1px 2px rgba(0,0,0,0.9), inset 0 1px 3px rgba(0,0,0,0.6);
    background: linear-gradient(135deg, #242528 0%, #101112 100%);
  }

  .power-btn-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .power-led {
    width: 6px;
    height: 6px;
    background-color: #021a05;
    border-radius: 50%;
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.9);
    transition: background-color 0.3s, box-shadow 0.3s;
  }

  .power-on .power-led {
    background-color: #00ff44;
    box-shadow: 0 0 8px #00ff44, 0 0 3px #00ff33, inset 0 1px 0 rgba(255,255,255,0.2);
  }

  .volume-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
    color: #72757c;
    font-size: 0.65rem;
    font-weight: bold;
    letter-spacing: 1px;
    width: 110px;
    min-width: 100px;
  }

  .volume-labels {
    display: flex;
    justify-content: space-between;
    padding: 0 1px;
  }

  .volume-slider-wrapper {
    background-color: #060608;
    border-top: 2px solid #000;
    border-left: 2px solid #000;
    border-right: 2px solid #37393f;
    border-bottom: 2px solid #44474e;
    padding: 4px 6px;
    border-radius: 3px;
    box-shadow: inset 0 4px 10px rgba(0,0,0,0.95), 0 1px 1px rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
  }

  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    outline: none;
    width: 100%;
    margin: 0;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 24px;
    border-radius: 1px;
    background: linear-gradient(90deg, #333 0%, #777 20%, #ececec 50%, #777 80%, #222 100%);
    border: 1px solid #000;
    box-shadow: 0 4px 8px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.4);
    cursor: pointer;
  }

  @media (max-width: 768px) {
    .buttons-row {
        justify-content: center;
        gap: 8px;
        margin-bottom: 0px !important;
        padding-bottom: 0px !important;
    }

    .separator-image {
        margin-top: 40px !important; /* Ajuste este valor (ex: 15px ou 20px) para dar o espaço exato que deseja */
        margin-bottom: 0px !important;
    }

    .separator-image img {
        height: 60px !important;
        margin: 0 !important;
    }
}
</style>

</head>

                  </div>
              </div>

              <div class="btn-socket">
                  <div class="btn-container">
                      <div class="btn-led"></div>

              </div>

              <div class="btn-socket">
                  <div class="btn-container" id="play-container">
                      <div class="btn-led"></div>
                      <button id="play-btn" title="Play/Pause">▶</button>
                  </div>
              </div>

              <div class="btn-socket">
                  <div class="btn-container">
                      <div class="btn-led"></div>
                      <button id="next-btn" title="Próximo">⏭</button>
                  </div>
              </div>
              
              <div class="volume-container">
                  <div class="volume-labels">
                      <span>VOLUME</span>
                      <span id="volume-val">80</span>

                      <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
                  </div>
              </div>
          </div>
      </div>
  </div>
</div>

    let currentStationIndex = null;
    let metadataInterval = null;
    let isPowerOn = true;

    const vuLeftContainer = document.getElementById('vu-left');
    const vuRightContainer = document.getElementById('vu-right');
    const numSegments = 18; 

    function createVUMeters() {
        for (let i = 0; i < numSegments; i++) {
            const segL = document.createElement('div');
            segL.classList.add('vu-segment');
            vuLeftContainer.appendChild(segL);

            const segR = document.createElement('div');
            segR.classList.add('vu-segment');
            vuRightContainer.appendChild(segR);
        }
    }
    createVUMeters();

    const leftSegments = vuLeftContainer.children;
    const rightSegments = vuRightContainer.children;

    let audioCtx = null;
    let analyser = null;
    let source = null;
    let dataArray = null;
    let animationFrameId = null;

    function initAudioAnalyser() {
        if (audioCtx) return; 
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64; 
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        } catch (e) {
            console.warn("Web Audio API bloqueada.", e);
        }
    }

    function drawVU() {
        if (!isPowerOn) return;
        animationFrameId = requestAnimationFrame(drawVU);
        if (!analyser || audio.paused) {
            resetVUMeters();
            return;
        }
        analyser.getByteFrequencyData(dataArray);
        let leftValue = 0, rightValue = 0;
        for (let i = 0; i < 4; i++) leftValue += dataArray[i];
        leftValue = leftValue / 4;
        for (let i = 4; i < 10; i++) rightValue += dataArray[i];
        rightValue = rightValue / 6;

        const leftLedsActive = Math.round((leftValue / 200) * numSegments);
        const rightLedsActive = Math.round((rightValue / 180) * numSegments);
        updateLEDArray(leftSegments, leftLedsActive);
        updateLEDArray(rightSegments, rightLedsActive);
    }

    function updateLEDArray(segments, numActive) {
        for (let i = 0; i < numSegments; i++) {
            segments[i].className = 'vu-segment'; 
            if (i < numActive) {
                if (i < 12) segments[i].classList.add('on-green'); 
                else if (i < 16) segments[i].classList.add('on-amber'); 
                else segments[i].classList.add('on-red');   
            }
        }
    }

    function resetVUMeters() {
        for (let i = 0; i < numSegments; i++) {
            leftSegments[i].className = 'vu-segment';
            rightSegments[i].className = 'vu-segment';
        }
    }

        if (isOn) {
            let delay = 0;
            for (let i = 0; i < segments.length; i++) {
                setTimeout(() => {
                    if (isPowerOn && currentStationIndex !== null && !audio.paused) {
                        segments[i].classList.add('on');
                    }
                }, delay);

            }
            ledTuning.classList.remove('tuning-active');
            ledSignal.classList.add('signal-active');
        } else {
            for (let i = 0; i < segments.length; i++) {
                segments[i].classList.remove('on');
            }
            ledTuning.classList.add('tuning-active');
            ledSignal.classList.remove('signal-active');
        }
    }

    function checkStationOverflow() {
        const container = document.querySelector('.lcd-station-container');
        const station = document.getElementById('lcd-station');
        station.classList.remove('scroll-enabled');
        station.style.display = 'inline-block';
        station.style.whiteSpace = 'nowrap';
        if (station.scrollWidth > container.clientWidth) {
            station.classList.add('scroll-enabled');
        }
    }

    async function fetchMetadata(station) {
        if (!isPowerOn) return;
        if (station.api) {
            try {
                const res = await fetch(station.api);
                const data = await res.json();
                const artist = data.main?.song?.artist || data.songs?.[0]?.artist;
                const title = data.main?.song?.title || data.songs?.[0]?.title;
                if (artist && title) {
                    lcdTrack.textContent = `${artist} - ${title}`.toUpperCase();
                    return; 
                }
            } catch (e) {}
        }
        try {
            const baseUrl = station.url.substring(0, station.url.lastIndexOf('/'));
            const response = await fetch(`${baseUrl}/status-json.xsl`);
            const data = await response.json();
            if (data.icestats && data.icestats.source) {
                let source = data.icestats.source;
                const sources = Array.isArray(source) ? source : [source];
                const activeSource = sources.find(s => 
                    station.url.includes(s.listenurl) || s.listenurl.includes(station.url)
                );
                if (activeSource && activeSource.title && activeSource.title.trim().length > 0) {
                    lcdTrack.textContent = activeSource.title.toUpperCase();
                    return;
                }
            }
        } catch (e) {}
        lcdTrack.textContent = "EM EMISSÃO: " + station.name.toUpperCase();
    }

    function startMetadataPolling(station) {
        clearInterval(metadataInterval);
        fetchMetadata(station);
        metadataInterval = setInterval(() => fetchMetadata(station), 15000);
    }

    function stopMetadataPolling() {
        clearInterval(metadataInterval);
        if (isPowerOn) {
            lcdTrack.textContent = "SISTEMA EM ESPERA";
        }
    }

    function updateLCD(status, station, genre) {
        if (!isPowerOn) return;
        lcdStatus.textContent = status;
        lcdStation.textContent = station;
        lcdGenre.textContent = genre;
    }

    function playStation(index) {
        if (!isPowerOn) return;
        initAudioAnalyser();
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        currentStationIndex = parseInt(index);
        const station = playlist[currentStationIndex];
        stationSelect.value = currentStationIndex;
        
        audio.pause();
        audio.src = "";
        audio.src = station.url;
        audio.load();
        
        updateLCD("A SINTONIZAR...", station.name, station.genre);
        setTimeout(checkStationOverflow, 100);
        lcdTrack.textContent = "A LIGAR À EMISSÃO...";
        stereoIndicator.classList.remove('active');
        playContainer.classList.remove('active');
        updateSignalStrength(false);
        
        audio.play()
            .then(() => {
                playBtn.innerHTML = "⏸";
                playContainer.classList.add('active'); 
                updateLCD("SINALOK - NO AR", station.name, station.genre);
                stereoIndicator.classList.add('active');
                updateSignalStrength(true);
                startMetadataPolling(station);
                if (!animationFrameId) drawVU();
            })
            .catch(err => {
                updateLCD("ERRO DE SINTONIA", station.name, "VERIFIQUE A LIGAÇÃO");
                stereoIndicator.classList.remove('active');
                playContainer.classList.remove('active');
                stopMetadataPolling();
                resetVUMeters();
                updateSignalStrength(false);
            });
    }

    stationSelect.addEventListener('change', (e) => {
        playStation(e.target.value);
    });

    playBtn.addEventListener('click', () => {
        if (!isPowerOn) return;
        if (currentStationIndex === null) {
            playStation(0);
            return;
        }

        initAudioAnalyser();
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        if (audio.paused) {
            const station = playlist[currentStationIndex];
            updateLCD("A SINTONIZAR...", station.name, station.genre);
            updateSignalStrength(false);
            audio.load(); 
            audio.play()
                .then(() => {
                    playBtn.innerHTML = "⏸";
                    playContainer.classList.add('active');
                    updateLCD("SINALOK - NO AR", station.name, station.genre);
                    stereoIndicator.classList.add('active');
                    updateSignalStrength(true);
                    startMetadataPolling(station);
                    if (!animationFrameId) drawVU();
                })
                .catch(err => {});
        } else {
            audio.pause();
            playBtn.innerHTML = "▶";
            playContainer.classList.remove('active');
            const station = playlist[currentStationIndex];
            updateLCD("EM PAUSA", station.name, station.genre);
            stereoIndicator.classList.remove('active');
            stopMetadataPolling();
            resetVUMeters();
            updateSignalStrength(false);
        }
    });

    nextBtn.addEventListener('click', () => {
        if (!isPowerOn) return;
        if (currentStationIndex === null) {
            playStation(0);
        } else {
            let nextIndex = (currentStationIndex + 1) % playlist.length;
            playStation(nextIndex);
        }
    });

    prevBtn.addEventListener('click', () => {
        if (!isPowerOn) return;
        if (currentStationIndex === null) {
            playStation(playlist.length - 1);
        } else {
            let prevIndex = (currentStationIndex - 1 + playlist.length) % playlist.length;
            playStation(prevIndex);
        }
    });

    volumeSlider.addEventListener('input', (e) => {
        const currentVolume = parseFloat(e.target.value);
        audio.volume = currentVolume;
        volumeVal.textContent = Math.round(currentVolume * 100);
    });

    powerBtn.addEventListener('click', () => {
        isPowerOn = !isPowerOn;
        if (isPowerOn) {
            chassis.classList.remove('power-off');
            powerContainer.classList.add('power-on');
            setTimeout(() => {
                lcdStatus.textContent = "SISTEMA PRONTO";
                lcdStation.textContent = "SEM SINAL";
                lcdGenre.textContent = "ESCOLHER EMISSORA";
                lcdTrack.textContent = "A AGUARDAR TRANSMISSÃO...";
                ledTuning.classList.add('tuning-active');
            }, 100);
        } else {
            audio.pause();
            stopMetadataPolling();
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
            chassis.classList.add('power-off');
            powerContainer.classList.remove('power-on');
            playContainer.classList.remove('active');
            stereoIndicator.classList.remove('active');
            resetVUMeters();
            updateSignalStrength(false);
            ledTuning.classList.remove('tuning-active');
            ledSignal.classList.remove('signal-active');
            playBtn.innerHTML = "▶";
        }
    });
</script>

</body>
</html>
